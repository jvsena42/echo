build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console-reports:
  active: true

complexity:
  LongParameterList:
    active: true
    ignoreAnnotated: ['Composable', 'Preview']
  LongMethod:
    active: true
    ignoreAnnotated: ['Composable', 'Preview']
  TooManyFunctions:
    active: true
    ignoreAnnotated: ['Composable']
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 15
    thresholdInObjects: 15
    thresholdInEnums: 15
    excludes:
      - '**/data/pubky/PubkyClient.kt'
      - '**/data/pubky/AndroidPubkyClient.kt'

exceptions:
  TooGenericExceptionCaught:
    active: true
    excludes:
      - '**/data/pubky/AndroidPubkyClient.kt'
      - '**/data/pubky/IosPubkyClient.kt'

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreAnnotated: ['Composable']

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'
  MatchingDeclarationName:
    active: true
    mustBeFirst: true
    excludes:
      - '**/Platform.android.kt'
      - '**/Platform.ios.kt'
      - '**/domain/model/Media.kt'
  ConstructorParameterNaming:
    active: true
    excludes:
      - '**/data/pubky/*Dtos.kt'
      - '**/data/pubky/*Dto.kt'

style:
  MagicNumber:
    active: true
    ignoreAnnotated: ['Composable', 'Preview']
    ignoreNumbers: ['-1', '0', '1', '2', '100']
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreHashCodeFunction: true
    excludes:
      - '**/data/pubky/Hashing.android.kt'
      - '**/data/pubky/Hashing.ios.kt'
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview', 'Composable']
  ReturnCount:
    active: true
    max: 3
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludeCommentStatements: true
  ForbiddenComment:
    active: false

formatting:
  active: true
  android: true
  autoCorrect: true
  Filename:
    active: false
  FunctionNaming:
    active: false
  MaximumLineLength:
    active: true
    maxLineLength: 140
  NoUnusedImports:
    active: true
  ArgumentListWrapping:
    active: false
  ParameterListWrapping:
    active: false
  Wrapping:
    active: false

Compose:
  active: true
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: false
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ContentTrailingLambda:
    active: true
  DefaultsVisibility:
    active: true
  LambdaParameterEventTrailing:
    active: true
  LambdaParameterInRestartableEffect:
    active: true
  Material2:
    active: false
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParam:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewPublic:
    active: true
  RememberContentMissing:
    active: true
  RememberStateMissing:
    active: true
  UnstableCollections:
    active: false
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
